name: Release

permissions:
  contents: write
  id-token: write

on:
  push:
    branches: [main]
    paths:
      - "package.json"

jobs:
  release:
    runs-on: ubuntu-latest
    # 只在 package.json 的 version 字段变更时触发
    # 跳过由 release-it 自动创建的提交
    if: "!contains(github.event.head_commit.message, 'chore(release)')"

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 启用 Corepack
        run: corepack enable

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: 安装依赖
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 2
          retry_on: error
          command: pnpm install --frozen-lockfile

      - name: 构建
        uses: nick-invision/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_on: error
          command: pnpm run build

      - name: 检查版本是否已发布
        id: check-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if npm view api2mcp@$VERSION version 2>/dev/null; then
            echo "Version $VERSION already exists on npm, skipping release"
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "Version $VERSION not yet published, proceeding with release"
            echo "published=false" >> $GITHUB_OUTPUT
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 创建 Git Tag
        if: steps.check-version.outputs.published == 'false'
        env:
          VERSION: ${{ steps.check-version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"

      - name: 发布到 NPM
        if: steps.check-version.outputs.published == 'false'
        run: pnpm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 创建 GitHub Release
        if: steps.check-version.outputs.published == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check-version.outputs.version }}
          name: v${{ steps.check-version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}